name: CI

# Workspace-level CI. Runs lint + typecheck + build + tests across all
# pnpm workspace packages (bridge, plugin) on every push/PR to main+develop.
#
# Note: a legacy npm-based workflow exists at bridge/.github/workflows/ci.yml
# from when bridge/ was its own repo. GitHub only reads workflows from this
# top-level directory, so the legacy file is inert and kept only as a
# reference for anyone who later plucks the bridge out as a standalone repo.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm -r lint

      - name: Format check (bridge, ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm --filter @postergully/finny-mcp format:check

      - name: Type check
        run: pnpm -r typecheck

      - name: Build
        run: pnpm -r build

      - name: Test
        run: pnpm --filter @postergully/finny-mcp test:run

      - name: Upload bridge dist artifact
        if: matrix.node-version == 20 && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v5
        with:
          name: bridge-dist
          path: bridge/dist/
          retention-days: 7
